<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Kumar Magnacity</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--color-dark);
            color: var(--color-white);
            padding: 2rem;
        }

        .error-container h1 {
            font-size: 8rem;
            margin: 0;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: var(--font-heading);
        }

        .error-container h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .error-container p {
            font-size: 1.1rem;
            opacity: 0.8;
            max-width: 500px;
            margin: 0 auto 2rem;
        }
    </style>
</head>

<body>
    <div class="error-page">
        <div class="error-container">
            <h1>404</h1>
            <h2>Oops! Land Not Found.</h2>
            <p>The page you are looking for might have been moved or doesn't exist. Let's get you back to the premier
                township.</p>
            <a href="index.html" class="btn-primary">Return to Home</a>
        </div>
    </div>
</body>

</html>
